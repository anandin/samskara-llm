# Production config for 7B model
model:
  n_seeds: 100000             # Larger memory bank
  n_dharma_rules: 50
  n_options: 3
  chitta_top_k: 100
  manas_layers: 8
  buddhi_layers: 16
  manas_temp: 1.5
  buddhi_temp: 0.3
  elevation_threshold: 0.7
  synthesis_threshold: 0.6

training:
  epochs: 5
  batch_size: 2              # Smaller batch for larger model
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5      # Lower LR for larger model
  warmup_steps: 500
  max_grad_norm: 1.0
  save_steps: 1000
  eval_steps: 500
  logging_steps: 25

data:
  train_file: "data/training/train.jsonl"
  eval_file: "data/training/eval.jsonl"
  max_seq_length: 4096

optimization:
  optimizer: "adamw"
  weight_decay: 0.01
  lr_scheduler: "cosine"
  fp16: true
  gradient_checkpointing: true
  deepspeed: "configs/ds_config.json"
