# Model Architecture
model:
  n_seeds: 10000              # Chitta memory bank size
  n_dharma_rules: 20          # Constitutional constraints
  n_options: 3                # Buddhi generates N options
  chitta_top_k: 50            # Seeds retrieved per query
  manas_layers: 4             # Reactive layer depth
  buddhi_layers: 8            # Discriminating layer depth
  manas_temp: 1.5             # High temperature (associative)
  buddhi_temp: 0.3            # Low temperature (focused)
  elevation_threshold: 0.7     # Auto-escalate if stability < this
  synthesis_threshold: 0.6    # Trigger synthesis if divergence > this

# Training
training:
  epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-5
  warmup_steps: 100
  max_grad_norm: 1.0
  save_steps: 500
  eval_steps: 250
  logging_steps: 10

# Data
data:
  train_file: "data/training/train.jsonl"
  eval_file: "data/training/eval.jsonl"
  max_seq_length: 2048

# Optimization
optimization:
  optimizer: "adamw"
  weight_decay: 0.01
  lr_scheduler: "cosine"
  fp16: true
  gradient_checkpointing: true
